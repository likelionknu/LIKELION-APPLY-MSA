server:
  port: 8082

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://DB_HOST:3306/DB_NAME
    username: DB_USERNAME
    password: DB_PASSWORD

  mail:
    host: MAIL_HOST
    port: 587
    username: MAIL_USERNAME
    password: MAIL_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: false

google:
  client:
    id: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_SECRET
  redirect:
    uri: GOOGLE_REDIRECT_URI

services:
  auth:
    url: AUTH_SERVICE_URL

discord:
  webhook:
    user: DISCORD_USER_WEBHOOK_URL
    application: DISCORD_APPLICATION_WEBHOOK_URL